<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Lernkartei: Russisch</title>
    <style>
        :root {
            --bg-color: #f0f7f4;
            --primary-green: #2d6a4f;
            --secondary-green: #40916c;
            --light-green: #d8f3dc;
            --accent-green: #1b4332;
            --white: #ffffff;
            --text-color: #1b4332;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-green);
            margin-bottom: 5px;
        }

        .main-content {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Fortschrittsanzeige */
        .progress {
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--secondary-green);
        }

        /* Karteikarten Container */
        .flashcard-container {
            width: 100%;
            height: 350px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 15px;
            background: var(--white);
            border: 4px solid var(--light-green);
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: var(--light-green);
            border-color: var(--secondary-green);
        }

        /* Dynamische Schriftgrößen */
        .term {
            font-size: 2.2rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
        }

        .translation {
            font-size: 1.8rem;
            color: var(--primary-green);
        }

        /* Buttons und Steuerung */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .nav-buttons {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            background-color: var(--primary-green);
            color: white;
            flex: 1;
        }

        button:hover {
            background-color: var(--secondary-green);
        }

        button:active {
            transform: scale(0.98);
        }

        .secondary-btn {
            background-color: var(--secondary-green);
        }

        .secondary-btn:hover {
            background-color: var(--accent-green);
        }

        /* Anleitung */
        .instructions {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            line-height: 1.6;
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .flashcard-container { height: 300px; }
            .term { font-size: 1.8rem; }
            .translation { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Vokabeltrainer Russisch</h1>
    <p>Thema: Alltag & Verben</p>
</header>

<div class="main-content">
    <div class="progress" id="progressText">1 / 40</div>

    <div class="flashcard-container" id="cardContainer">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <div class="term" id="frontText">Загрузка...</div>
            </div>
            <div class="card-face card-back">
                <div class="translation" id="backText">Laden...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="nav-buttons">
            <button id="prevBtn">← Vorherige</button>
            <button id="nextBtn">Nächste →</button>
        </div>
        <button class="secondary-btn" id="startBtn">An den Anfang</button>
        <button class="secondary-btn" id="shuffleBtn">Mischen 🔀</button>
    </div>

    <div class="instructions">
        <strong>Tastatursteuerung:</strong><br>
        Leertaste/Enter: Umdrehen | Pfeiltasten: Navigation | Pos1: Anfang
    </div>
</div>

<script>
    // Vokabeldaten
    const vocabularyRaw = [
        ["приноси́ть / принести́", "bringen, herbeibringen"],
        ["приходи́ть / прийти́", "kommen, ankommen"],
        ["кто", "wer"],
        ["кого́", "wen"],
        ["э́то", "das, dies"],
        ["фра́за", "der Satz, die Phrase"],
        ["выраже́ние", "der Ausdruck"],
        ["значе́ние", "die Bedeutung"],
        ["смысл", "der Sinn"],
        ["геро́й", "der Held, die Hauptfigur"],
        ["фильм", "der Film"],
        ["короткометра́жный фильм", "der Kurzfilm"],
        ["слы́шать / услы́шать", "hören"],
        ["слу́шать / послу́шать", "zuhören, lauschen"],
        ["стуча́ть / постуча́ть", "klopfen"],
        ["стук", "das Klopfen"],
        ["дверь", "die Tür"],
        ["стук в дверь", "das Klopfen an der Tür"],
        ["ве́чер", "der Abend"],
        ["по́здний ве́чер", "der späte Abend"],
        ["по́здно", "spät"],
        ["ночь", "die Nacht"],
        ["ждать / подожда́ть", "warten, erwarten"],
        ["никто́", "niemand"],
        ["спра́шивать / спроси́ть", "fragen"],
        ["отвеча́ть / отве́тить", "antworten"],
        ["говори́ть / сказа́ть", "sagen, sprechen"],
        ["испо́льзовать / воспо́льзоваться", "benutzen, verwenden"],
        ["раздражённый", "genervt, gereizt"],
        ["неожи́данный", "unerwartet"],
        ["ситуа́ция", "die Situation"],
        ["подходя́щий", "passend"],
        ["неподходя́щий", "unpassend"],
        ["эмоциона́льный", "emotional"],
        ["нейтра́льный", "neutral"],
        ["саркасти́ческий", "sarkastisch"],
        ["ве́тер", "der Wind"],
        ["объе́кт", "das Objekt"],
        ["неприя́тный", "unangenehm, lästig"],
        ["понима́ть / поня́ть", "verstehen"]
    ];

    let cards = [...vocabularyRaw];
    let currentIndex = 0;

    // DOM Elemente
    const card = document.getElementById('card');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const progressText = document.getElementById('progressText');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const startBtn = document.getElementById('startBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');

    function updateCard() {
        // Karte zurücksetzen (umdrehen auf Vorderseite)
        card.classList.remove('flipped');
        
        // Timeout damit Text erst nach dem Zurückdrehen wechselt (optional, hier sofort)
        setTimeout(() => {
            const currentData = cards[currentIndex];
            frontText.innerText = currentData[0];
            backText.innerText = currentData[1];
            
            // Schriftgröße dynamisch anpassen
            adjustFontSize(frontText, currentData[0]);
            adjustFontSize(backText, currentData[1]);
            
            progressText.innerText = `${currentIndex + 1} / ${cards.length}`;
        }, 150);
    }

    function adjustFontSize(element, text) {
        if (text.length > 25) {
            element.style.fontSize = "1.3rem";
        } else if (text.length > 15) {
            element.style.fontSize = "1.7rem";
        } else {
            element.style.fontSize = (element.parentElement.classList.contains('card-front')) ? "2.2rem" : "1.8rem";
        }
    }

    function flipCard() {
        card.classList.toggle('flipped');
    }

    function nextCard() {
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function shuffleCards() {
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    function goToStart() {
        currentIndex = 0;
        updateCard();
    }

    // Event Listener
    document.getElementById('cardContainer').addEventListener('click', flipCard);
    nextBtn.addEventListener('click', nextCard);
    prevBtn.addEventListener('click', prevCard);
    shuffleBtn.addEventListener('click', shuffleCards);
    startBtn.addEventListener('click', goToStart);

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case ' ':
            case 'Enter':
                e.preventDefault();
                flipCard();
                break;
            case 'ArrowRight':
                nextCard();
                break;
            case 'ArrowLeft':
                prevCard();
                break;
            case 'Home':
                goToStart();
                break;
        }
    });

    // Initialisierung
    updateCard();
</script>

</body>
</html>
