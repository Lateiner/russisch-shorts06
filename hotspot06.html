<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotspot-Training: Kontext & Nuancen</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .progress {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Hotspot Container */
        .hotspot-stage {
            position: relative;
            width: 100%;
            border-radius: 15px;
            border: 3px solid var(--primary);
            overflow: hidden;
            background: #000;
            line-height: 0;
        }

        .scene-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Die pulsierenden Punkte */
        .hotspot {
            position: absolute;
            width: 35px;
            height: 35px;
            background: rgba(230, 126, 34, 0.9);
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            animation: pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            z-index: 10;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* Infobox */
        .info-panel {
            margin: 20px 0;
            padding: 15px;
            background: #ecf0f1;
            border-left: 5px solid var(--accent);
            border-radius: 8px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            color: var(--primary);
        }

        .nav-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-next { background: var(--primary); color: white; }
        .btn-restart { background: var(--accent); color: white; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }

        @media (max-width: 500px) {
            .hotspot { width: 28px; height: 28px; }
            .info-panel { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="progress" id="progressText">Aufgabe 1 von 6</div>
    <h3 id="taskTitle">Untersuche die Details im Bild</h3>

    <div class="hotspot-stage" id="stage">
        <img src="" id="currentImg" class="scene-img">
        <div id="hotspotContainer"></div>
    </div>

    <div class="info-panel" id="infoBox">
        Klicke auf den pulsierenden Punkt im Bild, um die Erklärung zu sehen.
    </div>

    <div class="nav-controls">
        <button class="btn btn-restart" onclick="location.reload()">Neustart</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextTask()" disabled>Nächste Aufgabe</button>
    </div>
</div>

<script>
    const tasks = [
        {
            img: "Nacht. Jemand hämmert aggressiv an die Tür.jpg",
            title: "Die Uhrzeit & Die Tür",
            spots: [
                { x: "45%", y: "50%", text: "<b>Die Tür:</b> Aggressives Hämmern statt sanftem Klopfen rechtfertigt die genervte Frage 'Кого это принесло?'" }
            ]
        },
        {
            img: "Film-Szene. Der Held ist genervt vom Klopfen..jpg",
            title: "Der Gesichtsausdruck",
            spots: [
                { x: "50%", y: "30%", text: "<b>Die Mimik:</b> Er sieht konzentriert aus. Die Störung wird als lästiges Eindringen empfunden – typisch für 'принесло'." }
            ]
        },
        {
            img: "Mittag. Ein Freund klopft höflich an..jpg",
            title: "Höflicher Besuch",
            spots: [
                { x: "30%", y: "40%", text: "<b>Das Tageslicht:</b> Mittags ist ein Klopfen normal. Hier wäre 'Кого это принесло?' unhöflich; man sagt neutral 'Кто это?'." }
            ]
        },
        {
            img: "Abend. Du erwartest niemanden und es klingelt.jpg",
            title: "Die Dunkelheit",
            spots: [
                { x: "20%", y: "25%", text: "<b>Das Fenster:</b> Draußen ist es dunkel. Unerwartete Besuche nach Feierabend werden im Russischen oft mit diesem Ausdruck kommentiert." }
            ]
        },
        {
            img: "Schule. Du fragst, wer am Lehrerpult sitzt..jpg",
            title: "Offizielle Umgebung",
            spots: [
                { x: "60%", y: "45%", text: "<b>Das Pult:</b> In der Schule herrscht Etikette. Hier nutzt man niemals 'принесло', sondern immer die sachliche Form." }
            ]
        },
        {
            img: "Ein Fremder steht vor der Tür und du fragst sachlich..jpg",
            title: "Sachliche Klärung",
            spots: [
                { x: "50%", y: "50%", text: "<b>Distanz:</b> Wenn man sachlich wissen will, wer da ist, ohne Emotionen zu zeigen, bleibt man beim einfachen 'Кто это?'." }
            ]
        }
    ];

    let currentIdx = 0;

    function loadTask() {
        const task = tasks[currentIdx];
        document.getElementById('progressText').textContent = `Aufgabe ${currentIdx + 1} von ${tasks.length}`;
        document.getElementById('taskTitle').textContent = task.title;
        document.getElementById('currentImg').src = task.img;
        document.getElementById('infoBox').innerHTML = "Klicke auf den pulsierenden Punkt im Bild!";
        document.getElementById('nextBtn').disabled = true;

        const container = document.getElementById('hotspotContainer');
        container.innerHTML = "";

        task.spots.forEach(spot => {
            const el = document.createElement('div');
            el.className = 'hotspot';
            el.style.left = spot.x;
            el.style.top = spot.y;
            el.innerHTML = "?";
            el.onclick = () => {
                document.getElementById('infoBox').innerHTML = spot.text;
                document.getElementById('nextBtn').disabled = false;
            };
            container.appendChild(el);
        });
    }

    function nextTask() {
        currentIdx++;
        if (currentIdx < tasks.length) {
            loadTask();
        } else {
            showEnd();
        }
    }

    function showEnd() {
        document.getElementById('progressText').textContent = "Fertig!";
        document.getElementById('taskTitle').textContent = "Hervorragend!";
        document.getElementById('stage').innerHTML = "<div style='padding:50px; color:white; font-size:1.5rem;'>Du hast alle Kontexte verstanden! 🏆</div>";
        document.getElementById('infoBox').innerHTML = "Du kannst nun sicher zwischen sachlichen Fragen und emotionalen Ausdrücken unterscheiden.";
        document.getElementById('nextBtn').style.display = "none";
    }

    // Start
    window.onload = loadTask;
</script>

</body>
</html>
