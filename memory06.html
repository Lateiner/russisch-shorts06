<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Memory: Russisch-Deutsch</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --card-back: #34495e;
            --card-front: #ffffff;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        h2 { color: var(--primary); margin-bottom: 10px; text-align: center; }
        .info { color: #7f8c8d; margin-bottom: 20px; text-align: center; max-width: 500px; }

        /* Memory Grid */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 800px;
            width: 100%;
        }

        /* Responsivität: 4 Spalten auf größeren Bildschirmen */
        @media (min-width: 600px) {
            .memory-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .card {
            aspect-ratio: 3 / 4;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            transition: opacity 0.8s ease; /* Für das Verschwinden */
        }

        .card-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid var(--primary);
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
            font-size: 2rem;
        }

        .card-front {
            background-color: var(--card-front);
            color: var(--primary);
            transform: rotateY(180deg);
            font-weight: bold;
            font-size: 0.9rem;
            flex-direction: column;
        }

        .card-front img {
            width: 100%;
            height: 70%;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 5px;
        }

        .found {
            opacity: 0;
            pointer-events: none;
        }

        .restart-btn {
            margin-top: 30px;
            padding: 12px 25px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Text-Karten Styling */
        .text-card { font-size: 1.1rem !important; text-align: center; }
    </style>
</head>
<body>

    <h2>Vokabel-Memory</h2>
    <p class="info">Finde die passenden Paare zwischen den russischen Situationen und ihrer deutschen Bedeutung.</p>

    <div class="memory-grid" id="grid"></div>

    <button class="restart-btn" onclick="location.reload()">Spiel neustarten</button>

<script>
    // Definition der Paare: Bild-Karte und Text-Karte
    const cardsData = [
        { id: 1, type: 'img', content: 'Nacht. Jemand hämmert aggressiv an die Tür.jpg', match: 1 },
        { id: 1, type: 'txt', content: 'Кого это принесло? (Genervt: Wen hat es denn da angeschleppt?)', match: 1 },
        
        { id: 2, type: 'img', content: 'Mittag. Ein Freund klopft höflich an..jpg', match: 2 },
        { id: 2, type: 'txt', content: 'Кто это? (Neutral: Wer ist das?)', match: 2 },
        
        { id: 3, type: 'img', content: 'Film-Szene. Der Held ist genervt vom Klopfen..jpg', match: 3 },
        { id: 3, type: 'txt', content: 'Кого это принесло? (Sarkastisch bei Arbeitsstörung)', match: 3 },
        
        { id: 4, type: 'img', content: 'Schule. Du fragst, wer am Lehrerpult sitzt..jpg', match: 4 },
        { id: 4, type: 'txt', content: 'Кто это? (Sachliche Frage im Unterricht)', match: 4 },

        { id: 5, type: 'img', content: 'Abend. Du erwartest niemanden und es klingelt.jpg', match: 5 },
        { id: 5, type: 'txt', content: 'Кого это принесло? (Überrascht/Unwillig am Abend)', match: 5 },

        { id: 6, type: 'img', content: 'Ein Fremder steht vor der Tür und du fragst sachlich..jpg', match: 6 },
        { id: 6, type: 'txt', content: 'Кто это? (Höfliche Identitätsfeststellung)', match: 6 }
    ];

    let flippedCards = [];
    let matchedPairs = 0;
    const grid = document.getElementById('grid');

    // Karten mischen
    const shuffledCards = cardsData.sort(() => Math.random() - 0.5);

    function createBoard() {
        shuffledCards.forEach((data, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.match = data.match;
            card.dataset.index = index;

            const inner = document.createElement('div');
            inner.classList.add('card-inner');

            const back = document.createElement('div');
            back.classList.add('card-back');
            back.textContent = '?';

            const front = document.createElement('div');
            front.classList.add('card-front');
            
            if (data.type === 'img') {
                const img = document.createElement('img');
                img.src = data.content;
                front.appendChild(img);
                const label = document.createElement('span');
                label.textContent = "Situation";
                front.appendChild(label);
            } else {
                front.classList.add('text-card');
                front.textContent = data.content;
            }

            inner.appendChild(back);
            inner.appendChild(front);
            card.appendChild(inner);
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });
    }

    function flipCard() {
        if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 800);
            }
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        const isMatch = card1.dataset.match === card2.dataset.match;

        if (isMatch) {
            // Paar gefunden: Langsam verschwinden lassen
            card1.classList.add('found');
            card2.classList.add('found');
            matchedPairs++;
            
            if (matchedPairs === cardsData.length / 2) {
                setTimeout(() => alert('Super! Alle Paare gefunden!'), 1000);
            }
        } else {
            // Kein Match: Wieder umdrehen
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
        }
        flippedCards = [];
    }

    createBoard();
</script>

</body>
</html>
