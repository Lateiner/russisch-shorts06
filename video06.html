<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Lernportal: Interaktives Video-Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --error: #e74c3c;
            --overlay: rgba(0, 0, 0, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 { color: var(--primary); margin-bottom: 20px; }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            display: block;
        }

        /* Quiz Overlay */
        #quiz-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            display: none; /* Erst ab Sekunde 8 sichtbar */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            z-index: 10;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            width: 100%;
            max-width: 450px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .option-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .option-btn.correct { background: var(--success); border-color: var(--success); }
        .option-btn.wrong { background: var(--error); border-color: var(--error); }

        .controls {
            margin-top: 20px;
        }

        .restart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Responsive Anpassungen */
        @media (max-width: 600px) {
            .question-text { font-size: 1.1rem; }
            .option-btn { padding: 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Analysiere die Situation</h2>
    
    <div class="video-container">
        <!-- Das Video stoppt automatisch bei Sekunde 0:08 -->
        <video id="quizVideo" controls>
            <source src="Originalvideo.mp4" type="video/mp4">
            Dein Browser unterstützt dieses Video-Format leider nicht.
        </video>

        <!-- Quiz Ebene -->
        <div id="quiz-overlay">
            <div class="question-text">Warum nutzt der Held genau diesen Ausdruck? <br> („Кого это принесло?“)</div>
            <div class="options-grid">
                <button class="option-btn" onclick="checkAnswer(this, false)">Er freut sich auf einen Gast.</button>
                <button class="option-btn" onclick="checkAnswer(this, true)">Er ist genervt von dem späten Klopfen.</button>
                <button class="option-btn" onclick="checkAnswer(this, false)">Er hat den Gast selbst eingeladen.</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="restart-btn" onclick="resetAll()">Neustart</button>
    </div>
</div>

<script>
    const video = document.getElementById('quizVideo');
    const overlay = document.getElementById('quiz-overlay');
    let quizFired = false;

    // Überwacht die Laufzeit des Videos
    video.addEventListener('timeupdate', () => {
        // Stoppt bei Sekunde 8 (nach der Einführung der Phrase)
        if (video.currentTime >= 8 && !quizFired) {
            video.pause();
            video.controls = false; // Verhindert Vorspulen während des Quiz
            overlay.style.display = 'flex';
            quizFired = true;
        }
    });

    function checkAnswer(button, isCorrect) {
        if (isCorrect) {
            button.classList.add('correct');
            setTimeout(() => {
                overlay.style.display = 'none';
                video.controls = true;
                video.play(); // Setzt das Video fort
            }, 1000);
        } else {
            button.classList.add('wrong');
            setTimeout(() => {
                button.classList.remove('wrong');
            }, 800);
        }
    }

    function resetAll() {
        quizFired = false;
        video.currentTime = 0;
        overlay.style.display = 'none';
        video.controls = true;
        video.play();
    }
</script>

</body>
</html>
